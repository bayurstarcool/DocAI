<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocAI</title>
  <link rel="stylesheet" href="/fonts/inter.css">
  <style>
    body { background: #09090b; margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #app { min-height: 100vh; }
    .boot { display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #71717a; }
    #boot-error { display: none; position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1a1a24; border: 1px solid #ef4444; color: #ef4444; padding: 1rem 1.5rem; border-radius: 10px; font-size: 0.85rem; z-index: 9999; max-width: 90vw; text-align: center; }
  </style>
</head>
<body>
  <div id="app">
    <div class="boot">
      <div style="text-align:center">
        <div style="width:36px;height:36px;background:linear-gradient(135deg,#6366f1,#06b6d4);border-radius:10px;margin:0 auto 1rem"></div>
        <div>Loading DocAI...</div>
      </div>
    </div>
  </div>
  <div id="boot-error"></div>
  <script>
    window.addEventListener('error', function(e) {
      document.getElementById('boot-error').style.display = 'block';
      document.getElementById('boot-error').textContent = 'JS Error: ' + (e.message || 'unknown') + ' at ' + (e.filename || '');
    });
    window.addEventListener('unhandledrejection', function(e) {
      document.getElementById('boot-error').style.display = 'block';
      document.getElementById('boot-error').textContent = 'Promise Error: ' + String(e.reason);
    });
    setTimeout(function() {
      var el = document.getElementById('app');
      if (el && el.querySelector('.boot')) {
        document.getElementById('boot-error').style.display = 'block';
        document.getElementById('boot-error').textContent = 'Gagal memuat aplikasi. Periksa koneksi jaringan dan refresh halaman.';
      }
    }, 20000);
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
